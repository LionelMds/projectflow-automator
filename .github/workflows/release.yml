name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-windows:
    name: Build Windows
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build dependencies
        run: python -m pip install -e ".[packaging]"
      - name: Embed app settings
        shell: python
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          import json
          import os
          from pathlib import Path

          owner, repo = os.environ.get("GITHUB_REPOSITORY", "/").split("/", 1)
          path = Path("src/projectflow/resources/app_settings.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(
              json.dumps(
                  {
                      "github_owner": owner,
                      "github_repo": repo,
                  },
                  indent=2,
              ),
              encoding="utf-8",
          )
      - name: Build exe
        run: python -m projectflow.build --target windows
      - uses: actions/upload-artifact@v4
        with:
          name: ProjectFlowAutomator-windows
          path: dist/ProjectFlowAutomator.exe

  build-macos:
    name: Build macOS
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build dependencies
        run: python -m pip install -e ".[packaging]"
      - name: Embed app settings
        shell: python
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          import json
          import os
          from pathlib import Path

          owner, repo = os.environ.get("GITHUB_REPOSITORY", "/").split("/", 1)
          path = Path("src/projectflow/resources/app_settings.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(
              json.dumps(
                  {
                      "github_owner": owner,
                      "github_repo": repo,
                  },
                  indent=2,
              ),
              encoding="utf-8",
          )
      - name: Build app
        run: python -m projectflow.build --target macos
      - name: Sign app
        if: ${{ secrets.APPLE_DEVELOPER_ID != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_PWD != '' }}
        run: |
          codesign --deep --force --options runtime \
            --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
            "dist/ProjectFlow Automator.app"
      - name: Zip app for notarization
        run: ditto -c -k --keepParent "dist/ProjectFlow Automator.app" "dist/ProjectFlow Automator.zip"
      - name: Notarize app
        if: ${{ secrets.APPLE_DEVELOPER_ID != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_PWD != '' }}
        run: |
          xcrun notarytool submit "dist/ProjectFlow Automator.zip" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_PWD }}" \
            --wait
          xcrun stapler staple "dist/ProjectFlow Automator.app"
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg "dist/ProjectFlow Automator.dmg" "dist/ProjectFlow Automator.app"
      - uses: actions/upload-artifact@v4
        with:
          name: ProjectFlowAutomator-macos
          path: dist/ProjectFlow Automator.dmg

  publish:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
